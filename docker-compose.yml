version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: banking_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: bankingdb
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - banking_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: banking_backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/bankingdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=rootpassword
    depends_on:
      - db
    networks:
      - banking_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: banking_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - banking_network

networks:
  banking_network:
    driver: bridge

volumes:
  db_data:
